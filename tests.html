<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ObIT-NE · Suite de Testes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0A0F1E; color: #E8EDF7; padding: 32px; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #00B4D8; }
    .summary { font-size: 14px; color: #8896B3; margin-bottom: 24px; }
    .summary b { color: #E8EDF7; }
    .summary .pass { color: #06D6A0; }
    .summary .fail { color: #E76F51; }
    .group { margin-bottom: 20px; }
    .group-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #00B4D8; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(0,180,216,.2); }
    .test { display: flex; align-items: center; gap: 10px; padding: 6px 12px; font-size: 13px; border-radius: 6px; margin-bottom: 3px; }
    .test.pass { background: rgba(6,214,160,.08); }
    .test.fail { background: rgba(231,111,81,.12); }
    .icon { font-size: 14px; flex-shrink: 0; }
    .test.pass .icon { color: #06D6A0; }
    .test.fail .icon { color: #E76F51; }
    .test .name { flex: 1; }
    .test .detail { font-size: 11px; color: #8896B3; }
    .test.fail .detail { color: #E76F51; }
    .btn-run { background: linear-gradient(135deg, #0077B6, #00B4D8); border: none; color: #fff; padding: 10px 24px; border-radius: 50px; font-weight: 700; font-size: 13px; cursor: pointer; margin-bottom: 20px; }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,180,216,.4); }
  </style>
</head>
<body>
  <h1>ObIT-NE · Suite de Testes</h1>
  <p class="summary" id="summary">Carregando dados...</p>
  <button class="btn-run" onclick="runTests()">Executar Testes</button>
  <div id="results"></div>

  <!-- Carrega os mesmos dados do dashboard -->
  <script src="data.js"></script>
  <script>
    const tests = [];
    let passed = 0, failed = 0;

    function assert(name, condition, detail) {
      const ok = !!condition;
      tests.push({ name, ok, detail: detail || '' });
      if (ok) passed++; else failed++;
    }

    function assertEq(name, actual, expected) {
      const ok = actual === expected;
      assert(name, ok, ok ? '' : `esperado ${expected}, recebeu ${actual}`);
    }

    function runTests() {
      tests.length = 0;
      passed = 0;
      failed = 0;

      // ── Grupo 1: Integridade dos Dados ──────────────────────
      const EXPECTED_PERIODS = 6;

      assert('ESTADOS definido e não vazio', Array.isArray(ESTADOS) && ESTADOS.length === 9);
      assert('PERIODOS tem 6 elementos', Array.isArray(PERIODOS) && PERIODOS.length === EXPECTED_PERIODS);
      assert('PERIODOS inclui 2026*', PERIODOS.includes('2026*'));

      // Verifica arrays de cada indicador por estado
      ESTADOS.forEach(e => {
        assert(`chegadasInt[${e}] tem ${EXPECTED_PERIODS} valores`,
          chegadasInt[e] && chegadasInt[e].length === EXPECTED_PERIODS);
        assert(`receita[${e}] tem ${EXPECTED_PERIODS} valores`,
          receita[e] && receita[e].length === EXPECTED_PERIODS);
        assert(`ocupacao[${e}] tem ${EXPECTED_PERIODS} valores`,
          ocupacao[e] && ocupacao[e].length === EXPECTED_PERIODS);
        assert(`empregos[${e}] tem ${EXPECTED_PERIODS} valores`,
          empregos[e] && empregos[e].length === EXPECTED_PERIODS);
      });

      // Sem valores NaN ou negativos
      ESTADOS.forEach(e => {
        chegadasInt[e].forEach((v, i) => {
          assert(`chegadasInt[${e}][${i}] >= 0 e numérico`, typeof v === 'number' && v >= 0 && !isNaN(v));
        });
        receita[e].forEach((v, i) => {
          assert(`receita[${e}][${i}] >= 0 e numérico`, typeof v === 'number' && v >= 0 && !isNaN(v));
        });
        ocupacao[e].forEach((v, i) => {
          assert(`ocupacao[${e}][${i}] entre 0-100`, typeof v === 'number' && v >= 0 && v <= 100);
        });
      });

      // ── Grupo 2: Prospecções 2026 ───────────────────────────
      assert('prospecoes2026 definido', Array.isArray(prospecoes2026));
      assertEq('prospecoes2026 tem 9 estados', prospecoes2026.length, 9);

      prospecoes2026.forEach(d => {
        assert(`prospecoes2026[${d.uf}] tem indice 0-100`,
          typeof d.indice === 'number' && d.indice >= 0 && d.indice <= 100);
        assert(`prospecoes2026[${d.uf}] tem classificação válida`,
          ['ALTA', 'MEDIA-ALTA', 'MEDIA', 'CONSOLIDADO'].includes(d.classificacao));
        assert(`prospecoes2026[${d.uf}] tem rationale`, typeof d.rationale === 'string' && d.rationale.length > 10);
      });

      // Ranking ordenado por índice decrescente
      for (let i = 1; i < prospecoes2026.length; i++) {
        assert(`prospecoes2026 ordenado: ${prospecoes2026[i-1].uf} >= ${prospecoes2026[i].uf}`,
          prospecoes2026[i-1].indice >= prospecoes2026[i].indice);
      }

      // ── Grupo 3: Dados Auxiliares ───────────────────────────
      assertEq('ATRACAO_LABELS tem 6 categorias', ATRACAO_LABELS.length, 6);
      assertEq('ATRACAO_COLORS tem 6 cores', ATRACAO_COLORS.length, 6);
      assert('rankingDestinos definido e não vazio', Array.isArray(rankingDestinos) && rankingDestinos.length > 0);

      // Perfis de atração somam ~100% (tolerância ±5)
      Object.entries(atracoesPerEstado).forEach(([est, vals]) => {
        if (est === 'labels') return;
        const soma = vals.reduce((s, v) => s + v, 0);
        assert(`atracoesPerEstado[${est}] soma ≈ 100 (${soma})`, soma >= 95 && soma <= 105);
      });

      // Sazonalidade
      assert('sazonalidadePerEstado tem labels', Array.isArray(sazonalidadePerEstado.labels) && sazonalidadePerEstado.labels.length === 12);

      // ── Grupo 4: Confiança dos Dados ────────────────────────
      assert('DATA_CONFIDENCE definido', typeof DATA_CONFIDENCE === 'object');
      ['turistas', 'receita', 'ocupacao', 'empregos'].forEach(ind => {
        assert(`DATA_CONFIDENCE[${ind}] existe`, DATA_CONFIDENCE[ind] !== undefined);
        assert(`DATA_CONFIDENCE[${ind}].niveis tem ${EXPECTED_PERIODS} valores`,
          DATA_CONFIDENCE[ind].niveis.length === EXPECTED_PERIODS);
        DATA_CONFIDENCE[ind].niveis.forEach((n, i) => {
          assert(`DATA_CONFIDENCE[${ind}].niveis[${i}] válido`,
            ['verificado', 'estimativa', 'projecao'].includes(n));
        });
      });

      assert('CONFIDENCE_META definido', typeof CONFIDENCE_META === 'object');
      ['verificado', 'estimativa', 'projecao'].forEach(nivel => {
        assert(`CONFIDENCE_META[${nivel}] tem label, icon, color`,
          CONFIDENCE_META[nivel].label && CONFIDENCE_META[nivel].icon && CONFIDENCE_META[nivel].color);
      });

      // ── Grupo 5: Consistência Cross-Data ────────────────────
      // Alias turistas = chegadasInt
      assert('turistas é alias de chegadasInt', turistas === chegadasInt);

      // Todos os estados em ESTADOS existem nos datasets
      ESTADOS.forEach(e => {
        assert(`Estado "${e}" em todos os datasets`,
          chegadasInt[e] && receita[e] && ocupacao[e] && empregos[e]);
      });

      // ── Renderizar resultados ───────────────────────────────
      renderResults();
    }

    function renderResults() {
      const container = document.getElementById('results');
      const summary = document.getElementById('summary');

      summary.innerHTML = `<b>${tests.length}</b> testes · <span class="pass">${passed} passou</span> · <span class="fail">${failed} falhou</span>`;

      // Agrupar testes por prefixo
      const groups = {};
      tests.forEach(t => {
        const prefix = t.name.split('[')[0].split('(')[0].trim().replace(/ tem$| definido$| é$| existe$| entre$| >=$/,'');
        const group = prefix.length > 30 ? prefix.substring(0, 30) : prefix;
        if (!groups[group]) groups[group] = [];
        groups[group].push(t);
      });

      container.innerHTML = Object.entries(groups).map(([group, items]) => `
        <div class="group">
          <div class="group-title">${group} (${items.filter(t=>t.ok).length}/${items.length})</div>
          ${items.map(t => `
            <div class="test ${t.ok ? 'pass' : 'fail'}">
              <span class="icon">${t.ok ? '✓' : '✗'}</span>
              <span class="name">${t.name}</span>
              ${t.detail ? `<span class="detail">${t.detail}</span>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    // Auto-run on load
    window.addEventListener('DOMContentLoaded', runTests);
  </script>
</body>
</html>
